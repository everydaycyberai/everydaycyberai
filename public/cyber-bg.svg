<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020b14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020b14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#020b14" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#08202e"/>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <rect width="1920" height="1080" fill="url(#g3)"/>

  <!-- Circuit board traces - horizontal -->
  <g stroke="#22d3ee" stroke-opacity="0.18" stroke-width="1" fill="none" filter="url(#glow)">
    <path d="M0 200 H400 V250 H600 V200 H900"/>
    <path d="M300 400 H500 V350 H800 V400 H1100 V450 H1300"/>
    <path d="M600 600 H900 V550 H1100 V600 H1400"/>
    <path d="M0 750 H200 V800 H500 V750 H700 V700 H1000"/>
    <path d="M1200 150 H1500 V200 H1700 V150 H1920"/>
    <path d="M1000 500 H1200 V550 H1500 V500 H1920"/>
    <path d="M800 900 H1100 V850 H1400 V900 H1600 V950 H1920"/>
  </g>

  <!-- Circuit board traces - vertical -->
  <g stroke="#22d3ee" stroke-opacity="0.14" stroke-width="1" fill="none">
    <path d="M150 0 V150 H200 V350 H150 V500"/>
    <path d="M450 200 V400 H500 V600 H450 V800"/>
    <path d="M750 0 V200 H800 V450 H750 V700"/>
    <path d="M1050 300 V500 H1100 V700 H1050 V900"/>
    <path d="M1350 100 V300 H1400 V500 H1350 V750"/>
    <path d="M1650 200 V400 H1700 V600 H1650 V1080"/>
    <path d="M900 500 V650 H950 V800 H900 V1080"/>
  </g>

  <!-- Circuit nodes / dots -->
  <g fill="#22d3ee" filter="url(#glow)">
    <!-- Glowing nodes at circuit intersections -->
    <circle cx="400"  cy="200" r="4" fill-opacity="0.7"/>
    <circle cx="600"  cy="200" r="3" fill-opacity="0.5"/>
    <circle cx="900"  cy="200" r="5" fill-opacity="0.8"/>
    <circle cx="500"  cy="400" r="4" fill-opacity="0.6"/>
    <circle cx="800"  cy="400" r="3" fill-opacity="0.5"/>
    <circle cx="1100" cy="450" r="5" fill-opacity="0.7"/>
    <circle cx="900"  cy="600" r="4" fill-opacity="0.6"/>
    <circle cx="1100" cy="550" r="3" fill-opacity="0.5"/>
    <circle cx="200"  cy="800" r="4" fill-opacity="0.6"/>
    <circle cx="500"  cy="750" r="5" fill-opacity="0.7"/>
    <circle cx="700"  cy="700" r="3" fill-opacity="0.5"/>
    <circle cx="1500" cy="200" r="4" fill-opacity="0.7"/>
    <circle cx="1700" cy="150" r="3" fill-opacity="0.5"/>
    <circle cx="1200" cy="550" r="5" fill-opacity="0.8"/>
    <circle cx="1500" cy="500" r="4" fill-opacity="0.6"/>
    <circle cx="1100" cy="850" r="3" fill-opacity="0.5"/>
    <circle cx="1400" cy="900" r="4" fill-opacity="0.7"/>
    <circle cx="1600" cy="950" r="5" fill-opacity="0.8"/>
    <!-- Small dots scattered -->
    <circle cx="250"  cy="650" r="2" fill-opacity="0.4"/>
    <circle cx="680"  cy="320" r="2" fill-opacity="0.4"/>
    <circle cx="1280" cy="720" r="2" fill-opacity="0.4"/>
    <circle cx="1820" cy="380" r="2" fill-opacity="0.4"/>
    <circle cx="980"  cy="980" r="2" fill-opacity="0.4"/>
  </g>

  <!-- Larger glowing orbs in corners -->
  <circle cx="200"  cy="150"  r="120" fill="#0ea5e9" fill-opacity="0.06"/>
  <circle cx="1750" cy="900"  r="150" fill="#6366f1" fill-opacity="0.06"/>
  <circle cx="960"  cy="540"  r="200" fill="#22d3ee" fill-opacity="0.04"/>

  <!-- Hexagonal grid in corner -->
  <g stroke="#22d3ee" stroke-opacity="0.08" stroke-width="1" fill="none">
    <polygon points="50,50 100,25 150,50 150,100 100,125 50,100"/>
    <polygon points="150,50 200,25 250,50 250,100 200,125 150,100"/>
    <polygon points="250,50 300,25 350,50 350,100 300,125 250,100"/>
    <polygon points="100,125 150,100 200,125 200,175 150,200 100,175"/>
    <polygon points="200,125 250,100 300,125 300,175 250,200 200,175"/>
    <polygon points="50,200 100,175 150,200 150,250 100,275 50,250"/>
    <polygon points="150,200 200,175 250,200 250,250 200,275 150,250"/>
    <polygon points="250,200 300,175 350,200 350,250 300,275 250,250"/>
  </g>

  <!-- Top right hex grid -->
  <g stroke="#22d3ee" stroke-opacity="0.07" stroke-width="1" fill="none" transform="translate(1600,0)">
    <polygon points="50,50 100,25 150,50 150,100 100,125 50,100"/>
    <polygon points="150,50 200,25 250,50 250,100 200,125 150,100"/>
    <polygon points="100,125 150,100 200,125 200,175 150,200 100,175"/>
    <polygon points="200,125 250,100 300,125 300,175 250,200 200,175"/>
    <polygon points="50,200 100,175 150,200 150,250 100,275 50,250"/>
    <polygon points="150,200 200,175 250,200 250,250 200,275 150,250"/>
  </g>

  <!-- Binary text scattered (decorative) -->
  <g font-family="monospace" font-size="11" fill="#22d3ee" fill-opacity="0.12">
    <text x="50"   y="480">10110100 11001010 00110101</text>
    <text x="1400" y="300">11010011 00101101 10100110</text>
    <text x="700"  y="950">01001101 10110010 11010001</text>
    <text x="1200" y="750">10001011 01101001 00110110</text>
    <text x="100"  y="920">#!/usr/bin/env python3</text>
    <text x="1550" y="650">SELECT * FROM users WHERE</text>
    <text x="300"  y="1020">ssh -i key.pem admin@192.168.1.1</text>
  </g>
</svg>
